<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>2peer</title>
  <style>
    :root {
      --bg:       #0a0a0a;
      --panel:    #111;
      --panel-2:  #181818;
      --border:   rgba(255,255,255,0.08);
      --text:     #e0e0e0;
      --muted:    #777;
      --faint:    #3a3a3a;
      --accent:   #d0d0d0;
      --danger:   #7a1f1f;
      --danger-h: #9b2828;
      --r:        8px;
      --r-sm:     5px;
      --tb:       38px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* ── Titlebar ───────────────────────────────────────────────── */
    .titlebar {
      height: var(--tb);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px 0 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .titlebar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }
    .titlebar-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #444;
    }
    .titlebar-controls {
      display: flex;
      -webkit-app-region: no-drag;
    }
    .wbtn {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      transition: background 120ms ease, color 120ms ease;
      border-radius: 0;
    }
    .wbtn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .wbtn.close:hover { background: #c0392b; color: #fff; }

    /* ── Layout ─────────────────────────────────────────────────── */
    .app {
      height: calc(100vh - var(--tb));
      display: grid;
      grid-template-columns: 272px minmax(0,1fr);
      gap: 10px;
      padding: 10px;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
      min-height: 0;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .lbl {
      font-size: 10px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--faint);
    }
    .id-box {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 10px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 14px;
      letter-spacing: 0.04em;
      color: var(--text);
      word-break: break-all;
    }
    .row { display: flex; gap: 6px; }
    .row > * { flex: 1; }

    input {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--r-sm);
      padding: 9px 10px;
      outline: none;
      font-size: 13px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      transition: border-color 140ms ease;
    }
    input:focus { border-color: rgba(255,255,255,0.22); }
    input::placeholder { color: #333; }

    button {
      border: none;
      border-radius: var(--r-sm);
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 120ms ease, background 120ms ease;
      white-space: nowrap;
    }
    button:hover  { opacity: 0.82; }
    button:active { opacity: 0.65; }
    .btn-primary   { background: #d8d8d8; color: #0a0a0a; }
    .btn-secondary { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid var(--border); }
    .btn-danger    { background: var(--danger); color: #e8b4b4; border: 1px solid rgba(255,255,255,0.05); }
    .btn-danger:hover { background: var(--danger-h); opacity: 1; }
    .btn-sm { padding: 7px 10px; font-size: 11px; }

    .status-card {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
    }
    .status-log {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scrollbar-width: none;
    }
    .status-log::-webkit-scrollbar { display: none; }
    .status-log .entry {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      padding: 2px 0;
      word-break: break-word;
    }
    .status-log .entry:last-child {
      color: var(--text);
    }
    .status-log .entry strong { color: var(--text); }
    .status-log .entry.error { color: #b44; }
    .status-log .entry.error strong { color: #b44; }

    /* incoming call */
    .incoming-call { display: none; }
    .incoming-call.active { display: flex; }
    .incoming-call .caller { font-size: 12px; color: var(--muted); }
    .incoming-call .caller strong {
      font-family: ui-monospace, Menlo, Consolas, monospace;
      color: var(--text);
    }

    .info-tag {
      font-size: 11px;
      color: #2e2e2e;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Main ────────────────────────────────────────────────────── */
    .main {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      overflow: hidden;
    }
    .videos {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .video-card {
      flex: 1;
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--r);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .video-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .video-label { font-size: 11px; color: var(--muted); }
    .video-meta  { font-size: 10px; color: #2e2e2e; font-family: ui-monospace, Menlo, Consolas, monospace; }
    .video-actions { display: flex; align-items: center; gap: 5px; }

    .video-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      background: #050505;
    }
    .video-wrap.placeholder {
      background: #0a0a0a;
    }
    .video-wrap.placeholder::after {
      content: 'Нет трансляции';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-size: 14px;
    }
    .video-wrap:fullscreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
    }
    .video-wrap:fullscreen video {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }
    .fs-controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      opacity: 0;
      transition: opacity 300ms ease;
      z-index: 10000;
      pointer-events: none;
    }
    .fs-controls.visible { opacity: 1; pointer-events: auto; }
    .fs-label { font-size: 13px; color: #bbb; }
    .fs-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 8px 14px;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
    }
    .fs-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .fs-center-close {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 300ms ease;
      z-index: 10000;
    }
    .fs-center-close:hover { background: rgba(180,40,40,0.6); }
    .video-wrap:fullscreen:hover .fs-center-close,
    .fs-center-close.visible { opacity: 1; }
    .fs-center-close svg { width: 28px; height: 28px; color: #fff; }
    video {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: contain;
    }
    video:fullscreen, video:-webkit-full-screen {
      object-fit: contain;
      background: #000;
    }

    .icon-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 4px 8px;
      color: #555;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 120ms ease, background 120ms ease;
      white-space: nowrap;
    }
    .icon-btn:hover { color: var(--text); background: rgba(255,255,255,0.09); opacity: 1; }

    /* ── Source Picker Modal ─────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
    }
    .overlay.hidden { display: none; }
    .hidden { display: none !important; }
    .modal {
      background: #151515;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 18px;
      width: min(820px, 92vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .source-section-label {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 6px;
    }
    .source-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
      overflow-y: auto;
    }
    .source-item {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 140ms ease;
    }
    .source-item:hover { border-color: rgba(255,255,255,0.25); }
    .source-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      background: #0a0a0a;
    }
    .source-name {
      padding: 6px 8px;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Confirm Dialog ──────────────────────────────────────────── */
    .confirm-modal {
      background: #151515;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 20px 22px;
      width: min(340px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .confirm-msg { font-size: 13px; color: var(--text); line-height: 1.5; }
    .confirm-msg strong { font-family: ui-monospace, Menlo, Consolas, monospace; }
  </style>
</head>
<body>

<!-- Titlebar -->
<div class="titlebar">
  <div class="titlebar-left">
    <div class="titlebar-dot"></div>
    2peer
  </div>
  <div class="titlebar-controls">
    <button class="wbtn" id="btnMinimize" title="Свернуть">
      <svg width="11" height="2" viewBox="0 0 11 2" fill="currentColor"><rect width="11" height="1.5" rx="0.75"/></svg>
    </button>
    <button class="wbtn close" id="btnClose" title="Закрыть">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
        <line x1="1" y1="1" x2="10" y2="10"/><line x1="10" y1="1" x2="1" y2="10"/>
      </svg>
    </button>
  </div>
</div>

<!-- App -->
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="card">
      <span class="lbl">Ваш ID</span>
      <div class="id-box" id="selfId">—</div>
      <div class="row">
        <button class="btn-secondary btn-sm" id="copyIdBtn">Копировать</button>
        <button class="btn-secondary btn-sm" id="regenIdBtn">Новый ID</button>
      </div>
    </div>

    <div class="card">
      <span class="lbl">Позвонить</span>
      <input id="remoteIdInput" maxlength="64" placeholder="ID собеседника"/>
      <div class="row">
        <button class="btn-primary"  id="callBtn">Позвонить</button>
        <button class="btn-danger"   id="hangupBtn">Сбросить</button>
      </div>
    </div>

    <div class="incoming-call card" id="incomingCall">
      <span class="lbl">Входящий звонок</span>
      <div class="caller">от <strong id="callerIdLabel">—</strong></div>
      <div class="row">
        <button class="btn-primary btn-sm" id="acceptBtn">Принять</button>
        <button class="btn-danger  btn-sm" id="declineBtn">Отклонить</button>
      </div>
    </div>

    <div class="status-card">
      <span class="lbl">Статус</span>
      <div class="status-log" id="statusLog"></div>
    </div>

    <div style="margin-top:auto; display: flex; flex-direction: column; gap: 10px;">
      <div class="card" style="padding: 10px 14px;">
        <div class="info-tag" id="versionTag">--</div>
      </div>

      <div class="card" style="padding: 10px 14px;">
        <div class="info-tag" id="serverTag">--</div>
      </div>
    </div>

  </aside>

  <!-- Main -->
  <main class="main">
    <div class="videos">

      <div class="video-card">
        <div class="video-head">
          <span class="video-label">Ваш экран</span>
          <div class="video-actions">
            <span class="video-meta" id="localMeta">—</span>
            <button class="icon-btn" id="broadcastBtn">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
              </svg>
              Транслировать
            </button>
            <button class="icon-btn hidden" id="changeSourceBtn">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
              Сменить
            </button>
          </div>
        </div>
        <div class="video-wrap" id="localVideoWrap">
          <video id="localVideo" autoplay playsinline muted></video>
        </div>
      </div>

      <div class="video-card">
        <div class="video-head">
          <span class="video-label">Экран собеседника</span>
          <div class="video-actions">
            <span class="video-meta" id="remoteMeta">—</span>
            <button class="icon-btn" id="pipBtn">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2"/>
                <rect x="12" y="10" width="8" height="5" rx="1" fill="currentColor" stroke="none"/>
              </svg>
              PiP
            </button>
            <button class="icon-btn" id="fullscreenBtn">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
              </svg>
              Fullscreen
            </button>
          </div>
        </div>
        <div class="video-wrap" id="remoteVideoWrap">
          <video id="remoteVideo" autoplay playsinline></video>
          <div class="fs-controls" id="fsControls">
            <span class="fs-label">Экран собеседника</span>
            <button class="fs-btn" id="fsExitBtn">Закрыть (Esc)</button>
          </div>
          <div class="fs-center-close" id="fsCenterClose">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Source Picker Overlay -->
<div class="overlay hidden" id="sourcePickerOverlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">Выберите источник трансляции</span>
      <button class="btn-secondary btn-sm" id="sourcePickerClose">Отмена</button>
    </div>
    <div id="sourcePickerContent" style="overflow-y:auto; flex:1; min-height:0;"></div>
  </div>
</div>

<!-- Confirm Dialog Overlay -->
<div class="overlay hidden" id="confirmOverlay">
  <div class="confirm-modal">
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="row">
      <button class="btn-primary btn-sm"   id="confirmOk">Подтвердить</button>
      <button class="btn-secondary btn-sm" id="confirmCancel">Отмена</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="./renderer.js"></script>
</body>
</html>
