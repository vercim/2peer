<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <title>2peer - Fullscreen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100vw; height: 100vh;
      background: #000;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }
    .wrap {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    video {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
    }
    .controls {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      opacity: 0;
      transition: opacity 300ms ease;
    }
    body:hover .controls,
    body.show-controls .controls { opacity: 1; }
    .label { font-size: 13px; color: #bbb; }
    .btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 8px 14px;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
    }
    .btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .center-close {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      width: 64px; height: 64px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 300ms ease;
    }
    .center-close:hover { background: rgba(180,40,40,0.6); }
    .center-close.visible { opacity: 1; }
    .center-close svg { width: 28px; height: 28px; color: #fff; }
  </style>
</head>
<body>
  <div class="wrap">
    <video id="fsVideo" autoplay playsinline></video>
    <div class="center-close" id="centerClose">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </div>
    <div class="controls">
      <span class="label" id="videoLabel">Экран собеседника</span>
      <button class="btn" id="closeBtn">Закрыть (Esc)</button>
    </div>
  </div>
  <script>
    const fsVideo = document.getElementById('fsVideo');
    const videoLabel = document.getElementById('videoLabel');
    const closeBtn = document.getElementById('closeBtn');
    const centerClose = document.getElementById('centerClose');

    let hideTimeout = null;

    function showControls() {
      document.body.classList.add('show-controls');
      centerClose.classList.add('visible');
      clearTimeout(hideTimeout);
      hideTimeout = setTimeout(() => {
        document.body.classList.remove('show-controls');
        centerClose.classList.remove('visible');
      }, 3000);
    }

    document.body.addEventListener('mousemove', showControls);

    function closeFullscreen() {
      window.close();
    }

    closeBtn.addEventListener('click', closeFullscreen);
    centerClose.addEventListener('click', closeFullscreen);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeFullscreen();
    });

    if (window.electronAPI?.onFsVideo) {
      window.electronAPI.onFsVideo((stream) => {
        if (stream) fsVideo.srcObject = stream;
      });
    }
  </script>
</body>
</html>
