<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>2peer - fullscreen</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="w-screen h-screen bg-black overflow-hidden font-sans">
  <div class="w-full h-full flex items-center justify-center relative">
    <video class="max-w-full max-h-full object-contain" id="fsVideo" autoplay playsinline></video>
    <div class="fs-center-close absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-[rgba(0,0,0,0.7)] border border-[rgba(255,255,255,0.2)] rounded-full w-16 h-16 flex items-center justify-center cursor-pointer hover:bg-[rgba(180,40,40,0.6)]" id="centerClose">
      <svg class="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </div>
    <div class="fs-controls absolute bottom-0 left-0 right-0 h-16 bg-gradient-to-t from-black/90 to-transparent flex items-center justify-between px-5">
      <span class="text-[13px] text-[#bbb]" id="videoLabel">Peer Screen</span>
      <button class="bg-[rgba(255,255,255,0.08)] border border-[rgba(255,255,255,0.15)] rounded-[6px] py-2 px-[14px] text-[#ccc] text-[12px] cursor-pointer hover:bg-[rgba(255,255,255,0.15)] hover:text-white" id="closeBtn">Close (Esc)</button>
    </div>
  </div>
  <script>
    const fsVideo = document.getElementById('fsVideo');
    const videoLabel = document.getElementById('videoLabel');
    const closeBtn = document.getElementById('closeBtn');
    const centerClose = document.getElementById('centerClose');

    let hideTimeout = null;

    function showControls() {
      document.body.classList.add('show-controls');
      centerClose.classList.add('visible');
      clearTimeout(hideTimeout);
      hideTimeout = setTimeout(() => {
        document.body.classList.remove('show-controls');
        centerClose.classList.remove('visible');
      }, 3000);
    }

    document.body.addEventListener('mousemove', showControls);

    function closeFullscreen() {
      window.close();
    }

    closeBtn.addEventListener('click', closeFullscreen);
    centerClose.addEventListener('click', closeFullscreen);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeFullscreen();
    });

    if (window.electronAPI?.onFsVideo) {
      window.electronAPI.onFsVideo((stream) => {
        if (stream) fsVideo.srcObject = stream;
      });
    }
  </script>
</body>
</html>
